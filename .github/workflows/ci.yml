name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  static_analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # staticcheck ~ rubocop: deeper static analysis.
      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

      # gosec ~ brakeman: security-focused static analysis.
      - name: Gosec security scan
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -quiet ./...

  vulnerabilities:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # govulncheck ~ bundler-audit: known CVEs in dependencies and the stdlib.
      - name: Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
